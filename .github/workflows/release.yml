name: Release

on:
    workflow_run:
        workflows:
            - 'CI/CD Pipeline'
        types:
            - completed
        branches:
            - main
    workflow_dispatch:
        inputs: {}

permissions:
    contents: write
    pull-requests: write
    packages: write
    actions: write
    checks: write
    issues: write

jobs:
    release:
        # Only run if the triggering workflow succeeded or manual dispatch
        if: |
            github.event_name == 'workflow_dispatch' ||
            (
              github.event.workflow_run.conclusion == 'success' &&
              github.event.workflow_run.head_branch == 'main'
            )
        uses: winccoa-tools-pack/.github/.github/workflows/reusable-release.yml@main
        with:
            target_branch: main
            project_type: npm
        secrets: inherit

    notify-success:
        runs-on: ubuntu-latest
        needs: [release]
        if: success()

        steps:
            - name: Success Notification
              run: |
                  echo "Release ${{ needs.release.outputs.tag }} completed successfully!"
                  echo "Tested npm tarball (*.tgz) attached to the GitHub Release"
                  echo "Package published to npm with dist-tag: latest"
                  echo ""
                  echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }}"
